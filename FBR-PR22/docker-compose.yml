version: "3.8"

services:
  backend1:
    build: ./backend
    environment:
      - PORT=3000
    expose:
      - "3000"

  backend2:
    build: ./backend
    environment:
      - PORT=3000
    expose:
      - "3000"

  backend3:
    build: ./backend
    environment:
      - PORT=3000
    expose:
      - "3000"

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend1
      - backend2
      - backend3